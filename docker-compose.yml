services:
  postgres:
    image: postgres:16-alpine
    container_name: glass_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: glassliving
      POSTGRES_USER: glass
      POSTGRES_PASSWORD: glass_dev_pwd
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glass -d glassliving"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glass_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: glass_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: glass_minio
      MINIO_ROOT_PASSWORD: glass_minio_dev_pwd
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: glass_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  redis_data:
  minio_data:
