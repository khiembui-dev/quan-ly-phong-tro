<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="list" class="divide-y divide-[color:var(--line-soft)]">
    <a th:each="n : ${notifications}"
       th:href="${n.linkUrl} ?: '#'"
       class="flex gap-3 p-4 hover:bg-black/[0.03] transition group">
        <span class="w-10 h-10 shrink-0 rounded-xl bg-[color:var(--accent-soft)] grid place-items-center group-hover:scale-105 transition">
            <i data-lucide="bell" class="w-4 h-4 text-[color:var(--accent)]"></i>
        </span>
        <div class="flex-1 min-w-0">
            <div class="text-[13px] font-semibold leading-snug" th:text="${n.title}">Title</div>
            <div class="text-[12px] text-[color:var(--text-soft)] mt-0.5 line-clamp-2 leading-relaxed" th:text="${n.body}">Body</div>
            <div class="text-[11px] text-[color:var(--text-faint)] mt-1.5 inline-flex items-center gap-1 tnum">
                <i data-lucide="clock" class="w-3 h-3"></i>
                <span th:text="${#temporals.format(n.createdAt, 'dd/MM HH:mm')}">06/05 14:30</span>
            </div>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-[color:var(--text-faint)] group-hover:text-[color:var(--accent)] transition shrink-0 self-center"></i>
    </a>
    <div th:if="${notifications == null or notifications.isEmpty()}" class="p-10 text-center">
        <div class="empty-icon mx-auto mb-3">
            <i data-lucide="inbox" class="w-6 h-6"></i>
        </div>
        <div class="text-[14px] font-semibold">Chưa có thông báo nào</div>
        <p class="text-[12px] text-[color:var(--text-mute)] mt-1">Thông báo mới sẽ xuất hiện ở đây.</p>
    </div>
</div>

<div th:fragment="empty" class="p-6 text-center text-[12px] text-[color:var(--text-mute)]">
    Đăng nhập để xem thông báo.
</div>

</body>
</html>
