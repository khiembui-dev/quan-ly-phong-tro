<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth-layout}"
      lang="vi">
<head><title>Quên mật khẩu — SmartRent</title></head>
<body>
<div layout:fragment="content" class="w-full max-w-[480px]">
    <div class="glass-strong p-10">
        <h1 class="text-[28px] font-bold tracking-tight mb-1">Quên mật khẩu?</h1>
        <p class="text-[14px] text-[color:var(--text-mute)] mb-6">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
        <form class="space-y-4" method="post" action="#">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label class="form-label">Email</label>
                <div class="input-glass">
                    <i data-lucide="mail" class="w-4 h-4 text-[color:var(--text-mute)]"></i>
                    <input type="email" name="email" required placeholder="ban@gmail.com" />
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full">Gửi liên kết</button>
        </form>
        <p class="mt-6 text-center text-[14px] text-[color:var(--text-mute)]">
            <a href="/login" class="text-[color:var(--accent)] font-medium hover:underline">← Quay lại đăng nhập</a>
        </p>
    </div>
</div>
</body>
</html>
