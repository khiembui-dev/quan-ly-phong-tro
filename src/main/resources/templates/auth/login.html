<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth-layout}"
      lang="vi">
<head>
    <title>Đăng nhập — SmartRent</title>
</head>
<body>
<div layout:fragment="content" class="w-full max-w-[480px]">
    <div class="glass-strong p-10">
        <h1 class="text-[28px] font-bold tracking-tight mb-1">Chào mừng trở lại</h1>
        <p class="text-[14px] text-[color:var(--text-mute)] mb-8">Đăng nhập để tiếp tục với SmartRent.</p>

        <div th:if="${error}" class="mb-4 px-4 py-3 rounded-xl bg-[color:var(--err-soft)] text-[color:var(--err)] text-[13px]">
            <span th:text="${error}">Lỗi</span>
        </div>
        <div th:if="${info}" class="mb-4 px-4 py-3 rounded-xl bg-[color:var(--ok-soft)] text-[color:var(--ok)] text-[13px]">
            <span th:text="${info}">Thông báo</span>
        </div>

        <form method="post" action="/login" class="space-y-4">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
                <label class="form-label">Email</label>
                <div class="input-glass">
                    <i data-lucide="mail" class="w-4 h-4 text-[color:var(--text-mute)]"></i>
                    <input type="email" name="email" required autofocus placeholder="ban@gmail.com" />
                </div>
            </div>

            <div>
                <label class="form-label">Mật khẩu</label>
                <div class="input-glass" x-data="{ show: false }">
                    <i data-lucide="lock" class="w-4 h-4 text-[color:var(--text-mute)]"></i>
                    <input :type="show ? 'text' : 'password'" name="password" required minlength="8" />
                    <button type="button" @click="show = !show" class="text-[color:var(--text-mute)] hover:text-[color:var(--text)]">
                        <i data-lucide="eye" class="w-4 h-4" x-show="!show"></i>
                        <i data-lucide="eye-off" class="w-4 h-4" x-show="show" x-cloak></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="inline-flex items-center gap-2 text-[13px] cursor-pointer">
                    <input type="checkbox" name="remember-me" class="rounded border-[color:var(--line)] text-[color:var(--accent)] focus:ring-[color:var(--accent-ring)]" />
                    <span>Ghi nhớ tôi</span>
                </label>
                <a href="/forgot-password" class="text-[13px] text-[color:var(--accent)] hover:underline">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary w-full">
                Đăng nhập
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div class="my-6 flex items-center gap-3">
            <div class="flex-1 h-px bg-[color:var(--line)]"></div>
            <span class="text-[12px] text-[color:var(--text-mute)]">hoặc</span>
            <div class="flex-1 h-px bg-[color:var(--line)]"></div>
        </div>

        <button type="button" disabled class="btn btn-glass w-full opacity-60 cursor-not-allowed" title="Sẽ kích hoạt sau">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M22.5 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.32z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09a6.97 6.97 0 0 1 0-4.18V7.07H2.18a11 11 0 0 0 0 9.86l3.66-2.84z" fill="#FBBC04"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.46 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z" fill="#EA4335"/></svg>
            Tiếp tục với Google
        </button>

        <p class="mt-6 text-center text-[14px] text-[color:var(--text-mute)]">
            Chưa có tài khoản?
            <a href="/register" class="text-[color:var(--accent)] font-medium hover:underline">Đăng ký miễn phí</a>
        </p>
    </div>
</div>
</body>
</html>
