<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/head :: head('Lỗi — SmartRent')}"></head>
<body class="min-h-screen relative overflow-hidden">
<div class="mesh-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="relative z-10 min-h-screen grid place-items-center px-6">
    <div class="text-center max-w-[520px]">
        <div class="text-[110px] font-black tracking-tighter bg-gradient-to-br from-indigo-500 to-cyan-500 bg-clip-text text-transparent"
             th:text="${status} ?: '500'">500</div>
        <h1 class="text-[24px] font-bold tracking-tight" th:text="${error} ?: 'Có lỗi xảy ra'">Có lỗi xảy ra</h1>
        <p class="text-[14px] text-[color:var(--text-mute)] mt-2"
           th:text="${message} ?: 'Hệ thống đang gặp sự cố tạm thời. Vui lòng thử lại sau.'">
            Hệ thống đang gặp sự cố tạm thời. Vui lòng thử lại sau.
        </p>
        <a href="/" class="btn btn-primary mt-6">Về trang chủ</a>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
